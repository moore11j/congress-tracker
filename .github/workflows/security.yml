name: Security Checks

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "32 12 * * 1"

permissions:
  contents: read

concurrency:
  group: security-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit production frontend dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  backend-audit:
    name: Backend dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Show audited backend requirement pins
        run: |
          python - <<'PY'
          from pathlib import Path

          audited_packages = ("fastapi", "starlette", "pypdf")
          for line_number, line in enumerate(Path("backend/requirements.txt").read_text().splitlines(), 1):
              if any(package in line.lower() for package in audited_packages):
                  print(line_number, line)
          PY

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Audit backend requirements
        run: python -m pip_audit -r backend/requirements.txt

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
