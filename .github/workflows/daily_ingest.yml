name: Scheduled Ingest

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Ingest job to run"
        required: true
        default: "core"
        type: choice
        options:
          - core
          - recent-congress
          - government-contracts-daily
          - government-contracts-weekly
          - daily-repair
          - all
  schedule:
    - cron: "5 13-23 * * 1-5" # Recent Congress filings hourly on US business days (UTC)
    - cron: "15 */8 * * *" # Core ingest every 8 hours (UTC)
    - cron: "45 13 * * *" # Daily government contracts ingest
    - cron: "25 16 * * *" # Daily post-ingest outcome repair sweep
    - cron: "30 14 * * 1" # Weekly government contracts backfill on Mondays

concurrency:
  group: scheduled-ingest-${{ github.event.schedule || github.event.inputs.job || 'manual' }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Run ingest on Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.job }}" ]; then
            JOB_MODE="${{ github.event.inputs.job }}"
          elif [ "${{ github.event.schedule }}" = "5 13-23 * * 1-5" ]; then
            JOB_MODE="recent-congress"
          elif [ "${{ github.event.schedule }}" = "15 */8 * * *" ]; then
            JOB_MODE="core"
          elif [ "${{ github.event.schedule }}" = "45 13 * * *" ]; then
            JOB_MODE="government-contracts-daily"
          elif [ "${{ github.event.schedule }}" = "25 16 * * *" ]; then
            JOB_MODE="daily-repair"
          elif [ "${{ github.event.schedule }}" = "30 14 * * 1" ]; then
            JOB_MODE="government-contracts-weekly"
          else
            echo "Unknown schedule: '${{ github.event.schedule }}'"
            exit 1
          fi

          echo "Running ingest job: $JOB_MODE"
          flyctl ssh console -a congress-tracker-api -C "bash scripts/run_ingest_job.sh $JOB_MODE"
