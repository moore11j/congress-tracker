name: Scheduled Ingest

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Ingest job to run"
        required: true
        default: "core"
        type: choice
        options:
          - core
          - recent-congress
          - government-contracts-daily
          - government-contracts-weekly
          - daily-repair
          - market-data-refresh-daily
          - all
  schedule:
    - cron: "5 13-23 * * 1-5" # Recent Congress filings hourly on US business days (UTC)
    - cron: "15 */8 * * *" # Core ingest every 8 hours (UTC)
    - cron: "45 13 * * *" # Daily government contracts ingest
    - cron: "25 16 * * *" # Daily post-ingest outcome repair sweep
    - cron: "30 23 * * 1-5" # Daily market-data refresh after US close (UTC)
    - cron: "30 14 * * 1" # Weekly government contracts backfill on Mondays

concurrency:
  group: scheduled-ingest-writes
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install flyctl
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if curl --fail --location --retry 5 --retry-all-errors https://fly.io/install.sh | sh; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Run ingest on Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.job }}" ]; then
            JOB_MODE="${{ github.event.inputs.job }}"
          elif [ "${{ github.event.schedule }}" = "5 13-23 * * 1-5" ]; then
            JOB_MODE="recent-congress"
          elif [ "${{ github.event.schedule }}" = "15 */8 * * *" ]; then
            JOB_MODE="core"
          elif [ "${{ github.event.schedule }}" = "45 13 * * *" ]; then
            JOB_MODE="government-contracts-daily"
          elif [ "${{ github.event.schedule }}" = "25 16 * * *" ]; then
            JOB_MODE="daily-repair"
          elif [ "${{ github.event.schedule }}" = "30 23 * * 1-5" ]; then
            JOB_MODE="market-data-refresh-daily"
          elif [ "${{ github.event.schedule }}" = "30 14 * * 1" ]; then
            JOB_MODE="government-contracts-weekly"
          else
            echo "Unknown schedule: '${{ github.event.schedule }}'"
            exit 1
          fi

          REMOTE_COMMAND="cd /app && python -m app.ingest_run --job $JOB_MODE"
          echo "Running ingest job: $JOB_MODE"
          echo "Remote command: $REMOTE_COMMAND"
          log_file="$(mktemp)"
          for attempt in 1 2 3; do
            if flyctl ssh console -a congress-tracker-api -C "sh -lc \"$REMOTE_COMMAND\"" 2>&1 | tee "$log_file"; then
              exit 0
            fi

            if ! grep -Eqi "tunnel unavailable|Error contacting Fly.io API|context deadline exceeded|i/o timeout|connection reset|connection refused|has no started VMs|not have been deployed yet" "$log_file"; then
              exit 1
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "Fly SSH transport failed; retrying in $((attempt * 20)) seconds (attempt $attempt/3)"
            sleep $((attempt * 20))
          done
