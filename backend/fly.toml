# fly.toml app configuration file generated for congress-tracker-api on 2026-01-11T20:09:07-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'congress-tracker-api'
primary_region = 'yyz'

[[mounts]]
source = "data"
destination = "/data"

[build]
  dockerfile = "Dockerfile"
  context = "."

[env]
  DATA_ENRICHMENT_QUEUE_ENABLED = "true"
  DATA_ENRICHMENT_QUEUE_BATCH_SIZE = "50"
  DATA_ENRICHMENT_QUEUE_MAX_SECONDS = "45"
  FEED_PNL_REPAIR_ENABLED = "true"
  FEED_PNL_REPAIR_DAYS = "3"
  FEED_PNL_REPAIR_LIMIT = "500"
  FEED_PNL_REPAIR_MAX_SECONDS = "60"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8080"
  cron = "supercronic /app/crontab"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 3
  processes = ["app"]


  [[http_service.checks]]
    grace_period = "30s"
    interval = "20s"
    timeout = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  processes = ["app"]
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
  cpu_kind = 'shared'

[[vm]]
  processes = ["cron"]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
  cpu_kind = 'shared'
