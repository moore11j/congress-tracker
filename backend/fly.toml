# fly.toml app configuration file generated for congress-tracker-api on 2026-01-11T20:09:07-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'congress-tracker-api'
primary_region = 'yyz'

[[mounts]]
source = "data"
destination = "/data"

[build]
  dockerfile = "Dockerfile"
  context = "."

[env]
  ENRICHMENT_QUEUE_ENABLED = "false"
  DATA_ENRICHMENT_QUEUE_ENABLED = "false"
  DATA_ENRICHMENT_QUEUE_BATCH_SIZE = "10"
  DATA_ENRICHMENT_QUEUE_MAX_SECONDS = "20"
  FEED_PNL_REPAIR_ENABLED = "true"
  FEED_PNL_REPAIR_DAYS = "30"
  FEED_PNL_REPAIR_LIMIT = "300"
  FEED_PNL_REPAIR_MAX_SECONDS = "240"
  PRIORITY_TICKER_PREWARM_ENABLED = "false"
  PRIORITY_TICKER_PREWARM_SYMBOL_LIMIT = "25"
  PRIORITY_TICKER_PREWARM_PER_USER_LIMIT = "5"
  PRIORITY_TICKER_PREWARM_POPULAR_LIMIT = "0"
  INSIDER_ANALYTICS_PREWARM_ENABLED = "false"
  INSTITUTIONAL_SCHEDULED_INGEST_ENABLED = "false"
  INSTITUTIONAL_SCHEDULED_INGEST_START_PAGE = "9"
  INSTITUTIONAL_SCHEDULED_INGEST_MAX_SECONDS = "900"
  BACKGROUND_DB_PRESSURE_GUARD_ENABLED = "true"
  BACKGROUND_DB_PRESSURE_GUARD_FAIL_CLOSED = "true"
  BACKGROUND_DB_ACTIVE_CONNECTION_LIMIT = "16"
  BACKGROUND_DB_TOTAL_CONNECTION_LIMIT = "32"
  CRON_DB_POOL_SIZE = "2"
  CRON_DB_MAX_OVERFLOW = "0"
  CRON_DB_POOL_TIMEOUT = "3"
  AI_MARKETING_IMAGE_GENERATION_ENABLED = "true"
  AI_MARKETING_IMAGE_MODEL = "gpt-image-2"
  AI_MARKETING_IMAGE_SIZE = "1536x1024"
  AI_MARKETING_IMAGE_QUALITY = "high"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8080"
  cron = "supercronic /app/crontab"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 3
  processes = ["app"]


  [[http_service.checks]]
    grace_period = "30s"
    interval = "20s"
    timeout = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  processes = ["app"]
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
  cpu_kind = 'shared'

[[vm]]
  processes = ["cron"]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
  cpu_kind = 'shared'
